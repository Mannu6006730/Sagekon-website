<svg width="250" height="70" viewBox="0 0 250 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main Azure Gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle Glass Overlay -->
    <linearGradient id="glassOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    
    <!-- Depth Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUND (Transparent) -->
  <rect width="250" height="70" fill="transparent"/>

  <!-- ICON: Abstract Diamond/Circuit Hexagon -->
  <g transform="translate(10, 10) scale(1.1)" filter="url(#shadow)">
    <!-- Main Shape -->
    <path d="M25 0 L50 15 L50 45 L25 60 L0 45 L0 15 Z" fill="url(#mainGrad)"/>
    
    <!-- Geometric Accents -->
    <path d="M25 0 L50 15 L25 30 L0 15 Z" fill="#ffffff" opacity="0.2"/>
    <path d="M25 30 L50 45 L25 60 L0 45 Z" fill="#0f172a" opacity="0.1"/>
    
    <!-- Circuit lines -->
    <circle cx="25" cy="30" r="4" fill="#ffffff" opacity="0.9"/>
    <path d="M25 30 L25 10 M25 30 L40 40 M25 30 L10 40" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Gloss -->
    <path d="M25 0 L50 15 L50 45 L25 60 L0 45 L0 15 Z" fill="url(#glassOverlay)"/>
  </g>

  <!-- TEXT: SAGEKON -->
  <g transform="translate(75, 42)">
    <!-- SAGE (Bold/White) -->
    <text font-family="'Outfit', sans-serif" font-weight="800" font-size="32" fill="#ffffff" letter-spacing="-0.5">Sage<tspan fill="#38bdf8">Kon</tspan></text>
    
    <!-- Tagline (Jakarta Sans) -->
    <text y="18" font-family="'Plus Jakarta Sans', sans-serif" font-weight="600" font-size="10" fill="#94a3b8" letter-spacing="3.5" text-transform="uppercase">Systems &amp; Solutions</text>
  </g>
</svg>
